<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nube — Coming Soon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #030712;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 480px;
    }
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      margin: 0 auto 24px;
    }
    h1 {
      font-size: 36px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 8px;
    }
    .tagline {
      font-size: 16px;
      color: #4b5563;
      margin-bottom: 40px;
      line-height: 1.6;
    }
    .badge {
      display: inline-block;
      background: rgba(34,197,94,0.12);
      border: 1px solid rgba(34,197,94,0.3);
      color: #4ade80;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 20px;
      border-radius: 99px;
      margin-bottom: 40px;
    }
    .email-box {
      background: #0f172a;
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 32px;
    }
    .email-box p {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 16px;
    }
    .email-form {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .email-form input {
      flex: 1;
      min-width: 200px;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #1f2937;
      background: #030712;
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    .email-form input:focus {
      border-color: #22c55e;
    }
    .email-form button {
      padding: 12px 20px;
      border-radius: 12px;
      background: #22c55e;
      color: #fff;
      border: none;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .footer {
      font-size: 11px;
      color: #374151;
    }
    .footer a {
      color: #4b5563;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/logopng.png" alt="Nube" class="logo" />
    <h1>Nube</h1>
    <p class="tagline">
      Track your whole foods.<br/>
      Discover nutritional synergies.<br/>
      Own your health.
    </p>
    <div class="badge">🌿 Coming Soon</div>
    <div class="email-box">
      <p>Be the first to know when we launch.</p>
      <div class="email-form">
        <input type="email" placeholder="your@email.com" />
        <button onclick="notify()">Notify me</button>
      </div>
    </div>
    <p class="footer">
      <a href="mailto:hello@nubetracker.com">hello@nubetracker.com</a>
      &nbsp;·&nbsp;
      <a href="#">Impressum</a>
    </p>
  </div>
  <script>
    function notify() {
      const input = document.querySelector('input');
      if (input.value.includes('@')) {
        input.value = '';
        input.placeholder = '✓ You are on the list!';
        input.style.borderColor = '#22c55e';
      }
    }
  </script>
</body>
</html>
